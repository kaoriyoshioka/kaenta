<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KAENTA | STYLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./header.css" />
  <link rel="stylesheet" href="./sstyle.css" />
</head>
<body>

  <header class="site-header site-header--light">
    <div class="header-inner">
      <a class="header-logo" href="./index.html" aria-label="KAENTA Home">
        <span class="logo-main">KAENTA</span>
        <span class="logo-sub">kaori yoshioka</span>
      </a>
      <nav class="header-nav" aria-label="Primary">
        <a href="./index.html">Top</a>
        <a href="./sstyle.html" aria-current="page">Style</a>
        <a href="./about.html">About</a>
        <a href="./blog.html">Blog</a>
        <a href="./contact.html">Contact</a>
      </nav>
      <div class="header-info">
        <a href="tel:0000000000">TEL 000-000-0000</a>
      </div>
    </div>
  </header>

  <!-- ライトボックス -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" id="lightboxClose">× CLOSE</button>
    <img class="lightbox__img" id="lightboxImg" src="" alt="" />
  </div>

  <main class="gallery-page">

    <!-- PC：左チラ見え｜メイン｜右チラ見え -->
    <div class="pc-stage" id="pcStage">
      <div class="pc-side pc-side--prev" id="pcPrev"></div>
      <div class="pc-main" id="pcMain">
        <img class="pc-main__img" id="pcMainImg" src="" alt="" />
      </div>
      <div class="pc-side pc-side--next" id="pcNext"></div>
    </div>

    <!-- 説明文（PC） -->
    <div class="gallery-caption" id="galleryCaption">
      <p class="gallery-caption__text" id="captionText"></p>
    </div>

    <!-- PC：サムネイル（下・中央） -->
    <div class="pc-thumbs" id="pcThumbs"></div>

    <!-- SP：スライダー -->
    <div class="sp-slider" id="spSlider">
      <div class="sp-slider__track" id="spTrack"></div>
    </div>

    <!-- SP：説明文 -->
    <p class="sp-caption" id="spCaption" style="display:none;"></p>

    <!-- SP：ドット -->
    <div class="sp-dots" id="spDots"></div>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="./sstyle.js"></script>
</body>
</html>
